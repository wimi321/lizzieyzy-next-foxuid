name: Update Release Notes

on:
  workflow_dispatch:
    inputs:
      date_tag:
        description: Release date tag, for example 2026-03-23
        required: true
        default: 2026-03-24
      release_tag:
        description: Existing GitHub release tag to update
        required: true
        default: 2.5.3-next-2026-03-24.2

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          CHINA_MIRROR_URL: ${{ secrets.CHINA_MIRROR_URL }}
          CHINA_MIRROR_CODE: ${{ secrets.CHINA_MIRROR_CODE }}
        run: |
          python3 scripts/generate_release_notes.py \
            --from-gh \
            --repo "${{ github.repository }}" \
            --release-tag "${{ inputs.release_tag }}" \
            --date-tag "${{ inputs.date_tag }}" \
            --output "dist/release-meta/${{ inputs.date_tag }}-release-notes.md"

      - name: Upload generated notes artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-notes
          path: dist/release-meta/${{ inputs.date_tag }}-release-notes.md

      - name: Update GitHub release body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --notes-file "dist/release-meta/${{ inputs.date_tag }}-release-notes.md"

      - name: Download public release assets for Baidu mirror
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/release-gh
          gh release download "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --dir dist/release-gh \
            --clobber \
            -p "${{ inputs.date_tag }}-windows64.opencl.portable.zip" \
            -p "${{ inputs.date_tag }}-windows64.opencl.installer.exe" \
            -p "${{ inputs.date_tag }}-windows64.with-katago.portable.zip" \
            -p "${{ inputs.date_tag }}-windows64.with-katago.installer.exe" \
            -p "${{ inputs.date_tag }}-windows64.nvidia.portable.zip" \
            -p "${{ inputs.date_tag }}-windows64.nvidia.installer.exe" \
            -p "${{ inputs.date_tag }}-windows64.without.engine.portable.zip" \
            -p "${{ inputs.date_tag }}-windows64.without.engine.installer.exe" \
            -p "${{ inputs.date_tag }}-mac-arm64.with-katago.dmg" \
            -p "${{ inputs.date_tag }}-mac-amd64.with-katago.dmg" \
            -p "${{ inputs.date_tag }}-linux64.with-katago.zip"

      - name: Sync public assets to Baidu Netdisk mirror
        env:
          BAIDU_APP_KEY: ${{ secrets.BAIDU_APP_KEY }}
          BAIDU_APP_SECRET: ${{ secrets.BAIDU_APP_SECRET }}
          BAIDU_REFRESH_TOKEN: ${{ secrets.BAIDU_REFRESH_TOKEN }}
          BAIDU_ACCESS_TOKEN: ${{ secrets.BAIDU_ACCESS_TOKEN }}
          BAIDU_SHARE_URL: ${{ secrets.BAIDU_SHARE_URL }}
          BAIDU_SHARE_CODE: ${{ secrets.BAIDU_SHARE_CODE }}
          BAIDU_REMOTE_ROOT: ${{ secrets.BAIDU_REMOTE_ROOT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/sync_baidu_pan.py \
            --local-release-dir dist/release-gh \
            --release-tag "${{ inputs.release_tag }}" \
            --date-tag "${{ inputs.date_tag }}"
