name: Build Linux Release

on:
  workflow_dispatch:
    inputs:
      date_tag:
        description: Release date tag, for example 2026-03-24
        required: true
        default: 2026-03-24
      release_tag:
        description: Existing GitHub release tag to upload into
        required: true
        default: 1.0.0-next-2026-03-24.2

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y maven zip unzip curl

      - name: Generate app icons
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pillow
          python3 scripts/generate_app_icons.py

      - name: Build shaded jar
        run: mvn -DskipTests package

      - name: Prepare bundled KataGo assets
        env:
          MODEL_NAME: kata1-zhizi-b28c512nbt-muonfd2.bin.gz
          MODEL_URL: https://media.katagotraining.org/uploaded/networks/models/kata1/kata1-zhizi-b28c512nbt-muonfd2.bin.gz
        run: |
          set -euo pipefail
          mkdir -p .cache/katago
          MODEL_SOURCE="$PWD/.cache/katago/$MODEL_NAME"
          curl -fL --retry 5 --retry-all-errors -o "$MODEL_SOURCE" "$MODEL_URL"
          PREFERRED_MODEL_NAME="$MODEL_NAME" MODEL_SOURCE="$MODEL_SOURCE" ./scripts/prepare_bundled_katago.sh

      - name: Build Linux package
        run: ./scripts/package_release.sh "${{ inputs.date_tag }}" target/lizzie-yzy2.5.3-shaded.jar

      - name: Validate public Linux assets
        run: bash ./scripts/validate_release_assets.sh linux dist/release "${{ inputs.date_tag }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-release
          path: |
            dist/release/*linux64.with-katago.zip

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/release/*linux64.with-katago.zip \
            --repo "${{ github.repository }}" \
            --clobber
