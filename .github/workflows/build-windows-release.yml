name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      date_tag:
        description: Release date tag, for example 2026-03-24
        required: true
        default: 2026-03-24
      release_tag:
        description: Existing GitHub release tag to upload into
        required: true
        default: 1.0.0-next-2026-03-24.2

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Generate app icons
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          python scripts/generate_app_icons.py

      - name: Install packaging tools
        shell: powershell
        run: |
          choco install wixtoolset --no-progress -y

      - name: Build shaded jar
        shell: bash
        run: mvn -DskipTests package

      - name: Prepare bundled KataGo assets
        shell: bash
        env:
          MODEL_NAME: kata1-zhizi-b28c512nbt-muonfd2.bin.gz
          MODEL_URL: https://media.katagotraining.org/uploaded/networks/models/kata1/kata1-zhizi-b28c512nbt-muonfd2.bin.gz
        run: |
          set -euo pipefail
          mkdir -p .cache/katago
          MODEL_SOURCE="$PWD/.cache/katago/$MODEL_NAME"
          curl -fL --retry 5 --retry-all-errors -o "$MODEL_SOURCE" "$MODEL_URL"
          PREFERRED_MODEL_NAME="$MODEL_NAME" MODEL_SOURCE="$MODEL_SOURCE" ./scripts/prepare_bundled_katago.sh

      - name: Build Windows installer and portable package
        timeout-minutes: 120
        shell: bash
        run: |
          serial="${{ inputs.release_tag }}"
          serial="${serial##*.}"
          if [[ ! "$serial" =~ ^[0-9]+$ ]]; then
            serial="${GITHUB_RUN_ATTEMPT:-0}"
          fi
          WINDOWS_BUILD_SERIAL="$serial" \
            ./scripts/package_windows_exe.sh "${{ inputs.date_tag }}" 1.0.0 target/lizzie-yzy2.5.3-shaded.jar "${{ inputs.release_tag }}"

      - name: Validate public Windows assets
        shell: bash
        run: bash ./scripts/validate_release_assets.sh windows dist/release "${{ inputs.date_tag }}"

      - name: Audit Windows bundle UX checkpoints
        shell: bash
        run: |
          set -euo pipefail
          note_file="dist/release-meta/${{ inputs.date_tag }}-windows64-install.txt"
          test -f "$note_file"
          grep -q "Release display version: ${{ inputs.release_tag }}" "$note_file"
          grep -q "Smart Optimize" "$note_file"
          grep -q "first launch should work offline" "$note_file"
          grep -q "qiyi71w/readboard v3.0.1" "$note_file"
          test -f "dist/windows/input-with-katago/engines/katago/windows-x64/katago.exe"
          test -f "dist/windows/input-with-katago/PROJECT_INFO.txt"
          test -f "dist/windows/input-with-katago/readboard/readboard.exe"
          test -f "dist/windows/input-with-katago/readboard/lizzieyzy-next-readboard-manifest.txt"
          grep -qx "release-tag=v3.0.1" "dist/windows/input-with-katago/readboard/lizzieyzy-next-readboard-manifest.txt"
          grep -qx "asset-name=readboard-github-release-v3.0.1.zip" "dist/windows/input-with-katago/readboard/lizzieyzy-next-readboard-manifest.txt"
          grep -qx "sha256=b3c971c4192de96b6da9403ad6e70442a5f0e44b207627544238acb3123f6133" "dist/windows/input-with-katago/readboard/lizzieyzy-next-readboard-manifest.txt"
          grep -Eq '^Windows bundle: katago-v[0-9.]+-eigen-windows-x64\.zip$' "dist/windows/input-with-katago/engines/katago/VERSION.txt"
          test -f "dist/windows/input-opencl/engines/katago/windows-x64/katago.exe"
          test -f "dist/windows/input-opencl/PROJECT_INFO.txt"
          test -f "dist/windows/input-opencl/readboard/readboard.exe"
          test -f "dist/windows/input-opencl/readboard/lizzieyzy-next-readboard-manifest.txt"
          grep -Eq '^Windows OpenCL bundle: katago-v[0-9.]+-opencl-windows-x64\.zip$' "dist/windows/input-opencl/engines/katago/VERSION.txt"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/LizzieYzy Next.exe"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/app/PROJECT_INFO.txt"
          grep -q "java-options=-Dlizzie.next.version=${{ inputs.release_tag }}" "dist/windows/app-image-with-katago/LizzieYzy Next/app/LizzieYzy Next.cfg"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/app/readboard/readboard.exe"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/app/readboard/lizzieyzy-next-readboard-manifest.txt"
          test -f "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/LizzieYzy Next OpenCL.exe"
          test -f "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/app/PROJECT_INFO.txt"
          grep -q "java-options=-Dlizzie.next.version=${{ inputs.release_tag }}" "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/app/LizzieYzy Next OpenCL.cfg"
          test -f "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/app/readboard/readboard.exe"
          test -f "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/runtime/bin/java.exe"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/LizzieYzy Next NVIDIA.exe"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/PROJECT_INFO.txt"
          grep -q "java-options=-Dlizzie.next.version=${{ inputs.release_tag }}" "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/LizzieYzy Next NVIDIA.cfg"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/readboard/readboard.exe"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/runtime/bin/java.exe"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/katago.exe"
          test -f "dist/windows/input-nvidia/PROJECT_INFO.txt"
          test -f "dist/windows/input-nvidia/readboard/readboard.exe"
          test -f "dist/windows/input-nvidia/readboard/lizzieyzy-next-readboard-manifest.txt"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/cudart64_12.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/cublas64_12.dll"
          test -f "dist/windows/app-image-without.engine/LizzieYzy Next/LizzieYzy Next.exe"
          test -f "dist/windows/app-image-without.engine/LizzieYzy Next/app/PROJECT_INFO.txt"
          grep -q "java-options=-Dlizzie.next.version=${{ inputs.release_tag }}" "dist/windows/app-image-without.engine/LizzieYzy Next/app/LizzieYzy Next.cfg"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/cublasLt64_12.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/cudnn64_8.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/libz.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/lizzieyzy-next-nvidia-runtime-manifest.txt"
          find "dist/windows/input-nvidia/engines/katago/windows-x64" -maxdepth 1 -type f -name 'nvJitLink*.dll' | grep -q .
          grep -qx "nvidia" "dist/windows/input-nvidia/engines/katago/windows-x64/lizzieyzy-next-engine-backend.txt"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/cudart64_12.dll"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/cublas64_12.dll"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/cublasLt64_12.dll"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/cudnn64_8.dll"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/libz.dll"
          find "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64" -maxdepth 1 -type f -name 'nvJitLink*.dll' | grep -q .
          test -f "dist/windows/input-without.engine/PROJECT_INFO.txt"
          test -f "dist/windows/input-without.engine/readboard/readboard.exe"
          test -f "dist/windows/input-without.engine/readboard/lizzieyzy-next-readboard-manifest.txt"
          test -f "dist/windows/app-image-without.engine/LizzieYzy Next/app/PROJECT_INFO.txt"
          test -f "dist/windows/app-image-without.engine/LizzieYzy Next/app/readboard/readboard.exe"
          test -f "dist/windows/app-image-without.engine/LizzieYzy Next/runtime/bin/java.exe"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/runtime/bin/java.exe"
          for app_cfg in \
            "dist/windows/app-image-with-katago/LizzieYzy Next/app/LizzieYzy Next.cfg" \
            "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/app/LizzieYzy Next OpenCL.cfg" \
            "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/LizzieYzy Next NVIDIA.cfg" \
            "dist/windows/app-image-without.engine/LizzieYzy Next/app/LizzieYzy Next.cfg"; do
            if grep -qE 'sun\.java2d\.uiScale=1\.0|sun\.java2d\.uiScale\.enabled=false' "$app_cfg"; then
              echo "Windows package must not force Java UI scaling: $app_cfg"
              exit 1
            fi
          done
          for readboard_exe in \
            "dist/windows/input-with-katago/readboard/readboard.exe" \
            "dist/windows/input-opencl/readboard/readboard.exe" \
            "dist/windows/input-nvidia/readboard/readboard.exe" \
            "dist/windows/input-without.engine/readboard/readboard.exe" \
            "dist/windows/app-image-with-katago/LizzieYzy Next/app/readboard/readboard.exe" \
            "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/app/readboard/readboard.exe" \
            "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/readboard/readboard.exe" \
            "dist/windows/app-image-without.engine/LizzieYzy Next/app/readboard/readboard.exe"; do
            grep -a -q 'level="asInvoker"' "$readboard_exe"
            if grep -a -q 'level="requireAdministrator"' "$readboard_exe"; then
              echo "readboard.exe must not request administrator privileges: $readboard_exe"
              exit 1
            fi
          done

      - name: Smoke test bundled Windows app image
        shell: powershell
        run: |
          $appExe = Join-Path $PWD "dist\windows\app-image-with-katago\LizzieYzy Next\LizzieYzy Next.exe"
          & "$PWD\scripts\windows_smoke_test.ps1" -AppExe $appExe -WaitSeconds 60 -ProbeBoardSync

      - name: Smoke test Windows upgrade install path
        shell: powershell
        run: |
          $inputDir = Join-Path $PWD "dist\windows\input-with-katago"
          $iconPath = Join-Path $PWD "packaging\icons\app-icon.ico"
          & "$PWD\scripts\windows_upgrade_smoke.ps1" `
            -InputDir $inputDir `
            -MainJar "lizzie-yzy2.5.3-shaded.jar" `
            -IconPath $iconPath `
            -UpgradeUuid "c2ef73ec-f99a-4f3d-b950-f52c0186122a"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-release
          path: |
            dist/release/*windows64*.installer.exe
            dist/release/*windows64*.portable.zip
            dist/release-meta/*windows64-*.txt

      - name: Upload Windows smoke logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: windows-smoke-logs
          path: |
            ${{ runner.temp }}/lizzieyzy-next-msi-smoke/logs/*
            dist/windows/app-image-with-katago/LizzieYzy Next/LastConsoleLogs_*.txt
            dist/windows/app-image-with-katago/LizzieYzy Next/LastErrorLogs_*.txt

      - name: Upload assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/release/*windows64*.installer.exe \
            dist/release/*windows64*.portable.zip \
            --repo "${{ github.repository }}" \
            --clobber
