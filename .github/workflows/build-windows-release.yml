name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      date_tag:
        description: Release date tag, for example 2026-03-24
        required: true
        default: 2026-03-24
      release_tag:
        description: Existing GitHub release tag to upload into
        required: true
        default: 2.5.3-next-2026-03-24.2

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Generate app icons
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          python scripts/generate_app_icons.py

      - name: Install packaging tools
        shell: powershell
        run: |
          choco install wixtoolset --no-progress -y

      - name: Build shaded jar
        shell: bash
        run: mvn -DskipTests package

      - name: Prepare bundled KataGo assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cache/katago
          NETWORKS_HTML="$(curl -fsSL https://katagotraining.org/networks/)"
          RECOMMENDED_PATH="$(printf '%s' "$NETWORKS_HTML" | perl -0ne '
            if (/Strongest confidently-rated network:<\/span>\s*<a href="([^"]+)"/si) {
              print $1;
              exit 0;
            }
            if (/Latest network:<\/span>\s*<a href="([^"]+)"/si) {
              print $1;
              exit 0;
            }
            exit 1;
          ')"
          if [[ "$RECOMMENDED_PATH" != http* ]]; then
            RECOMMENDED_URL="https://katagotraining.org${RECOMMENDED_PATH}"
          else
            RECOMMENDED_URL="$RECOMMENDED_PATH"
          fi
          MODEL_FILENAME="$(basename "${RECOMMENDED_URL%%\?*}")"
          MODEL_SOURCE="$PWD/.cache/katago/$MODEL_FILENAME"
          curl -fL --retry 5 --retry-all-errors -o "$MODEL_SOURCE" "$RECOMMENDED_URL"
          MODEL_SOURCE="$MODEL_SOURCE" ./scripts/prepare_bundled_katago.sh

      - name: Build Windows installer and portable package
        shell: bash
        run: |
          serial="${{ inputs.release_tag }}"
          serial="${serial##*.}"
          if [[ ! "$serial" =~ ^[0-9]+$ ]]; then
            serial="${GITHUB_RUN_ATTEMPT:-0}"
          fi
          WINDOWS_BUILD_SERIAL="$serial" \
            ./scripts/package_windows_exe.sh "${{ inputs.date_tag }}" 2.5.3 target/lizzie-yzy2.5.3-shaded.jar

      - name: Validate public Windows assets
        shell: bash
        run: bash ./scripts/validate_release_assets.sh windows dist/release "${{ inputs.date_tag }}"

      - name: Audit Windows bundle UX checkpoints
        shell: bash
        run: |
          set -euo pipefail
          note_file="dist/release-meta/${{ inputs.date_tag }}-windows64-install.txt"
          test -f "$note_file"
          grep -q "Smart Optimize" "$note_file"
          grep -q "first launch should work offline" "$note_file"
          test -f "dist/windows/input-with-katago/engines/katago/windows-x64/katago.exe"
          grep -Eq '^Windows bundle: katago-v[0-9.]+-eigen-windows-x64\.zip$' "dist/windows/input-with-katago/engines/katago/VERSION.txt"
          test -f "dist/windows/input-opencl/engines/katago/windows-x64/katago.exe"
          grep -Eq '^Windows OpenCL bundle: katago-v[0-9.]+-opencl-windows-x64\.zip$' "dist/windows/input-opencl/engines/katago/VERSION.txt"
          test -f "dist/windows/app-image-with-katago/LizzieYzy Next/LizzieYzy Next.exe"
          test -f "dist/windows/app-image-opencl/LizzieYzy Next OpenCL/LizzieYzy Next OpenCL.exe"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/LizzieYzy Next NVIDIA.exe"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/katago.exe"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/cudart64_12.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/cublas64_12.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/cublasLt64_12.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/cudnn64_8.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/libz.dll"
          test -f "dist/windows/input-nvidia/engines/katago/windows-x64/lizzieyzy-next-nvidia-runtime-manifest.txt"
          find "dist/windows/input-nvidia/engines/katago/windows-x64" -maxdepth 1 -type f -name 'nvJitLink*.dll' | grep -q .
          grep -qx "nvidia" "dist/windows/input-nvidia/engines/katago/windows-x64/lizzieyzy-next-engine-backend.txt"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/cudart64_12.dll"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/cublas64_12.dll"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/cublasLt64_12.dll"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/cudnn64_8.dll"
          test -f "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64/libz.dll"
          find "dist/windows/app-image-nvidia/LizzieYzy Next NVIDIA/app/engines/katago/windows-x64" -maxdepth 1 -type f -name 'nvJitLink*.dll' | grep -q .

      - name: Smoke test bundled Windows app image
        shell: powershell
        run: |
          $appExe = Join-Path $PWD "dist\windows\app-image-with-katago\LizzieYzy Next\LizzieYzy Next.exe"
          & "$PWD\scripts\windows_smoke_test.ps1" -AppExe $appExe -WaitSeconds 60

      - name: Smoke test Windows upgrade install path
        shell: powershell
        run: |
          $inputDir = Join-Path $PWD "dist\windows\input-with-katago"
          $iconPath = Join-Path $PWD "packaging\icons\app-icon.ico"
          & "$PWD\scripts\windows_upgrade_smoke.ps1" `
            -InputDir $inputDir `
            -MainJar "lizzie-yzy2.5.3-shaded.jar" `
            -IconPath $iconPath `
            -UpgradeUuid "c2ef73ec-f99a-4f3d-b950-f52c0186122a"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-release
          path: |
            dist/release/*windows64*.installer.exe
            dist/release/*windows64*.portable.zip
            dist/release-meta/*windows64-*.txt

      - name: Upload Windows smoke logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: windows-smoke-logs
          path: |
            ${{ runner.temp }}/lizzieyzy-next-msi-smoke/logs/*
            dist/windows/app-image-with-katago/LizzieYzy Next/LastConsoleLogs_*.txt
            dist/windows/app-image-with-katago/LizzieYzy Next/LastErrorLogs_*.txt

      - name: Upload assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/release/*windows64*.installer.exe \
            dist/release/*windows64*.portable.zip \
            --repo "${{ github.repository }}" \
            --clobber
