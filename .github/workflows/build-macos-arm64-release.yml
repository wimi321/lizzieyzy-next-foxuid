name: Build macOS arm64 Release

on:
  workflow_dispatch:
    inputs:
      date_tag:
        description: Release date tag, for example 2026-03-16
        required: true
        default: 2026-03-16
      release_tag:
        description: Existing GitHub release tag to upload into
        required: true
        default: 2.5.3-next-foxuid-2026-03-21.1

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install build tools
        run: |
          brew update
          brew install maven katago

      - name: Build shaded jar
        run: mvn -DskipTests package

      - name: Prepare bundled KataGo assets
        env:
          HTTPS_PROXY: ""
          HTTP_PROXY: ""
          ALL_PROXY: ""
        run: ./scripts/prepare_bundled_katago.sh

      - name: Build macOS arm64 package
        run: ./scripts/package_macos_dmg.sh "${{ inputs.date_tag }}" 2.5.3 target/lizzie-yzy2.5.3-shaded.jar

      - name: Validate public macOS arm64 assets
        run: bash ./scripts/validate_release_assets.sh mac-arm64 dist/release "${{ inputs.date_tag }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-with-katago
          path: |
            dist/release/*mac-arm64.with-katago.dmg

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/release/*mac-arm64.with-katago.dmg \
            --repo "${{ github.repository }}" \
            --clobber
